services:
  postgres:
    image: postgres:15
    container_name: pw-ims-postgres
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: ims_db
      POSTGRES_USER: pw_user
      POSTGRES_PASSWORD: pw_local_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pw-network

  ims-service:
    build: .
    container_name: pw-ims-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://pw_user:pw_local_dev@pw-ims-postgres:5432/ims_db
      NATS_URL: nats://pw-nats:4222
    depends_on:
      - postgres
    networks:
      - pw-network

volumes:
  postgres_data:

networks:
  pw-network:
    external: true