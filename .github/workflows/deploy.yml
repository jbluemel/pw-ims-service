name: Deploy to ECS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPO: 900889879753.dkr.ecr.us-east-2.amazonaws.com/pw-ims-service
  ECS_CLUSTER: pw-ims-cluster
  ECS_SERVICE: pw-ims-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO

      - name: Build, tag, push
        run: |
          docker build -t pw-ims-service .
          docker tag pw-ims-service:latest $ECR_REPO:latest
          docker push $ECR_REPO:latest

      - name: Deploy to ECS
        run: aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment --region $AWS_REGION
